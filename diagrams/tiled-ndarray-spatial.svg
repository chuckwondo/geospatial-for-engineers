<svg xmlns="http://www.w3.org/2000/svg" viewBox="-13 15 421 289" role="img" aria-labelledby="tis-title tis-desc" class="dg">
  <title id="tis-title">The spatial tile set</title>
  <desc id="tis-desc">The same array cut by tileShape [null, 300, 400] into a two-by-two grid of four tiles. Each tile is one quarter of the x-y plane but keeps all four time steps, drawn as a small deck, and is labelled with its tile indices {y} and {x}, the URL its template expands to, and its shape [4, 300, 400]. Dashed lines mark the 400 and 300 split on the x and y axes.</desc>
