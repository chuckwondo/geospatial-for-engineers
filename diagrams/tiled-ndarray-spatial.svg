  <text class="axl" x="178" y="283" text-anchor="middle">x</text>
  <line class="axis" x1="42" y1="255" x2="42" y2="49" marker-end="url(#b)"/>
  <line class="tk" x1="38" y1="247" x2="42" y2="247"/><text class="tick" x="34" y="250" text-anchor="end">0</text>
  <line class="tk" x1="38" y1="151" x2="42" y2="151"/><text class="tick" x="34" y="154" text-anchor="end">300</text>
  <line class="tk" x1="38" y1="55" x2="42" y2="55"/><text class="tick" x="34" y="58" text-anchor="end">600</text>
  <text class="axl" x="8" y="154" text-anchor="middle">y</text>
  <line class="axis" x1="319" y1="246" x2="340" y2="225" marker-end="url(#b)"/>
  <text class="axl" x="344" y="238">t (0&#8594;3)</text>
  <defs><marker id="b" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 z" fill="#64748b"/></marker></defs>
