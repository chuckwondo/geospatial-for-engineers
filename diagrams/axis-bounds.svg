<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 426 216" role="img" aria-labelledby="ab-title ab-desc" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <title id="ab-title">With no bounds, the same six positions support two different grids</title>
  <desc id="ab-desc">Six positions, the three longitudes 12.0, 12.5 and 13.0 crossed with the two latitudes 45.0 and 45.5, are drawn as dots. Two candidate grids are laid over them. The shaded grid reads each position as the center of its cell, so its cells box each dot without touching it, and it begins at 11.75, 44.75. The dashed grid reads each position as a cell corner, so its lines cross exactly at the dots, and it begins at 12.0, 45.0. The dots are the same under either reading; only the grid drawn around them moves, by half a cell along each axis at once, measured by the arrow at the lower left. Nothing in the coordinates chooses between the two, which is what an axis's bounds member settles.</desc>

  <rect x="1" y="1" width="424" height="214" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>

  <!-- READING A: positions as cell centers. Shaded cells box each dot. -->
  <g fill="#e0e7ff" stroke="#4338ca" stroke-width="1.5">
    <rect x="70" y="48" width="56" height="56"/><rect x="126" y="48" width="56" height="56"/><rect x="182" y="48" width="56" height="56"/>
    <rect x="70" y="104" width="56" height="56"/><rect x="126" y="104" width="56" height="56"/><rect x="182" y="104" width="56" height="56"/>
  </g>

  <!-- READING B: positions as cell corners. Dashed lines cross at each dot. -->
  <g stroke="#3730a3" stroke-width="1.5" stroke-dasharray="4 3">
    <line x1="98" y1="20" x2="266" y2="20"/><line x1="98" y1="76" x2="266" y2="76"/><line x1="98" y1="132" x2="266" y2="132"/>
    <line x1="98" y1="20" x2="98" y2="132"/><line x1="154" y1="20" x2="154" y2="132"/><line x1="210" y1="20" x2="210" y2="132"/><line x1="266" y1="20" x2="266" y2="132"/>
  </g>

  <!-- THE POSITIONS: identical under either reading -->
  <g fill="#4338ca">
    <circle cx="98" cy="132" r="5"/><circle cx="154" cy="132" r="5"/><circle cx="210" cy="132" r="5"/>
    <circle cx="98" cy="76" r="5"/><circle cx="154" cy="76" r="5"/><circle cx="210" cy="76" r="5"/>
  </g>

  <!-- HIGHLIGHT: one grid begins half a cell along each axis from the other -->
  <line x1="70" y1="160" x2="98" y2="132" stroke="#f59e0b" stroke-width="2"/>
  <g fill="#f59e0b">
    <polygon points="70,160 79,157 73,151"/><polygon points="98,132 89,135 95,141"/>
  </g>
  <text x="64" y="178" font-size="10" font-weight="700" fill="#b45309" text-anchor="end">half a cell</text>

  <!-- Coordinates -->
  <g font-size="11" fill="#4338ca" font-family="ui-monospace, Menlo, monospace">
    <g text-anchor="end"><text x="60" y="80">45.5</text><text x="60" y="136">45.0</text></g>
    <g text-anchor="middle"><text x="98" y="180">12.0</text><text x="154" y="180">12.5</text><text x="210" y="180">13.0</text></g>
  </g>
  <text x="24" y="108" font-size="12" font-style="italic" font-weight="700" fill="#3730a3" text-anchor="middle">y</text>
  <text x="154" y="199" font-size="12" font-style="italic" font-weight="700" fill="#3730a3" text-anchor="middle">x</text>

  <!-- KEY -->
  <g transform="translate(300, 76)">
    <rect x="0" y="-9" width="18" height="18" fill="#e0e7ff" stroke="#4338ca" stroke-width="1.5"/>
    <circle cx="9" cy="0" r="3.5" fill="#4338ca"/>
    <text x="26" y="4" font-size="10.5" font-weight="600" fill="#334155">read as centers</text>
  </g>
  <g transform="translate(300, 118)">
    <line x1="0" y1="0" x2="18" y2="0" stroke="#3730a3" stroke-width="1.5" stroke-dasharray="4 3"/>
    <line x1="9" y1="-9" x2="9" y2="9" stroke="#3730a3" stroke-width="1.5" stroke-dasharray="4 3"/>
    <circle cx="9" cy="0" r="3.5" fill="#4338ca"/>
    <text x="26" y="4" font-size="10.5" font-weight="600" fill="#334155">read as corners</text>
  </g>
</svg>
