    <text x="126" y="100" text-anchor="middle" font-size="10" style="fill:var(--dg-ink)">…/temporal/0.covjson</text>
    <text x="126" y="118" text-anchor="middle" font-size="9.5" style="fill:var(--dg-line)">[1, 600, 800]</text>
    <line x1="47" y1="164" x2="214" y2="164" style="stroke:var(--dg-line)" stroke-width="1.2" marker-end="url(#tt-c)"/>
    <line x1="47" y1="164" x2="47" y2="27" style="stroke:var(--dg-line)" stroke-width="1.2" marker-end="url(#tt-c)"/>
