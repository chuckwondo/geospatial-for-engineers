<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 196" role="img" aria-labelledby="ax-title ax-desc" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <title id="ax-title">Independent axes versus a composite axis</title>
  <desc id="ax-desc">Two copies of the same three-by-three coordinate grid. Left: with two independent axes named x and y, all nine cells hold data, so three longitudes and three latitudes describe nine positions. Right: only three positions hold data, shown as filled points joined by a zig-zag path, while the other six cells a grid would invent stay hollow, so a composite axis lists just those three positions explicitly as tuples.</desc>

  <rect x="1" y="1" width="578" height="194" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
  <line x1="290" y1="22" x2="290" y2="184" stroke="#e2e8f0" stroke-width="1"/>

  <text x="150" y="30" text-anchor="middle" font-size="12.5" font-weight="600" fill="#334155">independent axes &#8594; a grid</text>
  <text x="420" y="30" text-anchor="middle" font-size="12.5" font-weight="600" fill="#334155">one composite axis &#8594; a list of points</text>

  <!-- ===== LEFT: independent axes fill every cell (9 real) ===== -->
  <g stroke="#e8edf3" stroke-width="1" stroke-dasharray="3 3">
    <line x1="80" y1="54" x2="80" y2="122"/><line x1="150" y1="54" x2="150" y2="122"/><line x1="220" y1="54" x2="220" y2="122"/>
    <line x1="80" y1="54" x2="220" y2="54"/><line x1="80" y1="88" x2="220" y2="88"/><line x1="80" y1="122" x2="220" y2="122"/>
  </g>
  <g fill="#4338ca">
    <circle cx="80" cy="54" r="4.5"/><circle cx="150" cy="54" r="4.5"/><circle cx="220" cy="54" r="4.5"/>
    <circle cx="80" cy="88" r="4.5"/><circle cx="150" cy="88" r="4.5"/><circle cx="220" cy="88" r="4.5"/>
    <circle cx="80" cy="122" r="4.5"/><circle cx="150" cy="122" r="4.5"/><circle cx="220" cy="122" r="4.5"/>
  </g>
  <g font-size="10" fill="#4338ca" font-family="ui-monospace, Menlo, monospace">
    <g text-anchor="end"><text x="66" y="58">46.0</text><text x="66" y="92">45.5</text><text x="66" y="126">45.0</text></g>
    <g text-anchor="middle"><text x="80" y="138">12.0</text><text x="150" y="138">12.5</text><text x="220" y="138">13.0</text></g>
  </g>
  <text x="150" y="160" text-anchor="middle" font-size="10.5" fill="#475569">all nine cells hold data</text>
  <text x="150" y="176" text-anchor="middle" font-size="9" fill="#94a3b8">3 x's &#215; 3 y's describe 9 positions</text>

  <!-- ===== RIGHT: same grid, only 3 of 9 real ===== -->
  <g stroke="#e8edf3" stroke-width="1" stroke-dasharray="3 3">
    <line x1="350" y1="54" x2="350" y2="122"/><line x1="420" y1="54" x2="420" y2="122"/><line x1="490" y1="54" x2="490" y2="122"/>
    <line x1="350" y1="54" x2="490" y2="54"/><line x1="350" y1="88" x2="490" y2="88"/><line x1="350" y1="122" x2="490" y2="122"/>
  </g>
  <g fill="#ffffff" stroke="#cbd5e1" stroke-width="1.3">
    <circle cx="350" cy="54" r="4"/><circle cx="350" cy="88" r="4"/>
    <circle cx="420" cy="88" r="4"/><circle cx="420" cy="122" r="4"/>
    <circle cx="490" cy="54" r="4"/><circle cx="490" cy="122" r="4"/>
  </g>
  <polyline points="350,122 420,54 490,88" fill="none" stroke="#4338ca" stroke-width="2"/>
  <g fill="#4338ca">
    <circle cx="350" cy="122" r="4.5"/><circle cx="420" cy="54" r="4.5"/><circle cx="490" cy="88" r="4.5"/>
  </g>
  <g font-size="10" fill="#94a3b8" font-family="ui-monospace, Menlo, monospace">
    <g text-anchor="end"><text x="336" y="58">46.0</text><text x="336" y="92">45.5</text><text x="336" y="126">45.0</text></g>
    <g text-anchor="middle"><text x="350" y="138">12.0</text><text x="420" y="138">12.5</text><text x="490" y="138">13.0</text></g>
  </g>
  <text x="420" y="160" text-anchor="middle" font-size="10.5" fill="#475569">only 3 of the 9 hold data</text>
  <text x="420" y="176" text-anchor="middle" font-size="9" fill="#94a3b8">&#9711; a grid would invent &#183; &#9679; actual data</text>
</svg>
