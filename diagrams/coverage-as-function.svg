<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320" role="img" aria-labelledby="cf-title cf-desc" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <title id="cf-title">A coverage function maps a domain to a range</title>
  <desc id="cf-desc">A box labeled Domain holds a grid of positions in space and time; an arrow labeled f, the coverage, maps it to a box labeled Range holding a matching grid of measured values, one value per position. A worked instance is highlighted in amber: one position marked "here" in the domain is threaded across to its value in the matching cell of the range, annotated f of (12.5 degrees, 45.3 degrees, 12:00) equals 18.4 -- asking the coverage for the value at one position returns one number.</desc>

  <rect x="1" y="1" width="758" height="318" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>

  <text x="380" y="48" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">A coverage function maps a domain to a range</text>

  <!-- Domain: a grid of positions -->
  <rect x="48" y="96" width="250" height="156" rx="14" fill="#eef2ff" stroke="#6366f1" stroke-width="2.5"/>
  <text x="173" y="130" text-anchor="middle" font-size="18" font-weight="700" fill="#3730a3">DOMAIN</text>
  <text x="173" y="154" text-anchor="middle" font-size="13" fill="#4338ca">positions in space &amp; time</text>
  <text x="173" y="172" text-anchor="middle" font-size="13" fill="#4338ca">(the inputs)</text>
  <g fill="#6366f1">
    <circle cx="113" cy="202" r="4"/><circle cx="173" cy="202" r="4"/><circle cx="233" cy="202" r="4"/>
    <circle cx="113" cy="226" r="4"/><circle cx="173" cy="226" r="4"/><circle cx="233" cy="226" r="4"/>
  </g>
  <!-- worked instance: one position "here" (amber spotlight) -->
  <circle cx="113" cy="202" r="10" fill="#f59e0b" opacity="0.25"/>
  <circle cx="113" cy="202" r="6" fill="#f59e0b" stroke="#ffffff" stroke-width="1.2"/>
  <text x="113" y="190" text-anchor="middle" font-size="10" font-weight="700" fill="#b45309">here</text>

  <!-- Range: a matching grid of values, one per position -->
  <rect x="462" y="96" width="250" height="156" rx="14" fill="#f0fdfa" stroke="#0f766e" stroke-width="2.5"/>
  <text x="587" y="130" text-anchor="middle" font-size="18" font-weight="700" fill="#0f766e">RANGE</text>
  <text x="587" y="154" text-anchor="middle" font-size="13" fill="#0d9488">measured values</text>
  <text x="587" y="172" text-anchor="middle" font-size="13" fill="#0d9488">(the outputs)</text>
  <!-- highlight the value in the matching cell -->
  <rect x="505" y="192" width="44" height="20" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <g fill="#0f766e" font-size="13" font-weight="600" text-anchor="middle" font-family="ui-monospace, Menlo, monospace">
    <text x="527" y="207">18.4</text><text x="587" y="207">17.9</text><text x="647" y="207">19.2</text>
    <text x="527" y="231">18.1</text><text x="587" y="231">null</text><text x="647" y="231">18.8</text>
  </g>

  <!-- Arrow: the coverage as a whole -->
  <line x1="306" y1="174" x2="452" y2="174" stroke="#334155" stroke-width="3"/>
  <polygon points="462,174 446,166 446,182" fill="#334155"/>
  <text x="382" y="162" text-anchor="middle" font-size="16" font-weight="700" font-style="italic" fill="#334155">f</text>
  <text x="382" y="196" text-anchor="middle" font-size="12" fill="#64748b">the coverage</text>

  <!-- the concrete mapping: this position -> its value in the matching cell -->
  <path d="M113 202 Q 308 248, 496 202" fill="none" stroke="#f59e0b" stroke-width="2"/>
  <polygon points="505,202 495,197 495,207" fill="#f59e0b"/>

  <text x="380" y="284" text-anchor="middle" font-size="14" font-weight="700" fill="#b45309">f(12.5&#176;, 45.3&#176;, 12:00) = 18.4</text>
  <text x="380" y="302" text-anchor="middle" font-size="11.5" fill="#64748b">ask &#8220;what is the value here?&#8221; and it answers</text>
</svg>
