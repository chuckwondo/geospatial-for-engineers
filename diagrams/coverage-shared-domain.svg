<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 388" role="img" aria-labelledby="sd-title sd-desc" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <title id="sd-title">One domain, multiple ranges</title>
  <desc id="sd-desc">A single box labeled Domain, holding a grid of positions in space and time, fans out by two arrows labeled f1 and f2 to two separate boxes on the right: a temperature range and a humidity range. Each range holds its own grid of measured values for the same positions, showing multiple functions that share one domain within a single coverage -- one range per property.</desc>

  <rect x="1" y="1" width="718" height="386" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>

  <text x="360" y="48" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">One domain &#8594; multiple ranges</text>

  <!-- the single shared domain -->
  <rect x="35" y="144" width="250" height="156" rx="14" fill="#eef2ff" stroke="#6366f1" stroke-width="2.5"/>
  <text x="160" y="180" text-anchor="middle" font-size="18" font-weight="700" fill="#3730a3">DOMAIN</text>
  <text x="160" y="204" text-anchor="middle" font-size="13" fill="#4338ca">positions in space &amp; time</text>
  <text x="160" y="222" text-anchor="middle" font-size="13" fill="#4338ca">(the shared inputs)</text>
  <g fill="#6366f1">
    <circle cx="100" cy="252" r="4"/><circle cx="160" cy="252" r="4"/><circle cx="220" cy="252" r="4"/>
    <circle cx="100" cy="276" r="4"/><circle cx="160" cy="276" r="4"/><circle cx="220" cy="276" r="4"/>
  </g>

  <!-- range 1: temperature -->
  <rect x="435" y="92" width="250" height="116" rx="14" fill="#f0fdfa" stroke="#0f766e" stroke-width="2.5"/>
  <text x="560" y="120" text-anchor="middle" font-size="16" font-weight="700" fill="#0f766e">RANGE: temperature</text>
  <text x="560" y="138" text-anchor="middle" font-size="11.5" fill="#0d9488">measured values, in &#176;C</text>
  <g fill="#0f766e" font-size="13" font-weight="600" text-anchor="middle" font-family="ui-monospace, Menlo, monospace">
    <text x="490" y="172">18.4</text><text x="560" y="172">17.9</text><text x="630" y="172">19.2</text>
    <text x="490" y="196">18.1</text><text x="560" y="196">null</text><text x="630" y="196">18.8</text>
  </g>

  <!-- range 2: humidity -->
  <rect x="435" y="236" width="250" height="116" rx="14" fill="#f0fdfa" stroke="#0f766e" stroke-width="2.5"/>
  <text x="560" y="264" text-anchor="middle" font-size="16" font-weight="700" fill="#0f766e">RANGE: humidity</text>
  <text x="560" y="282" text-anchor="middle" font-size="11.5" fill="#0d9488">measured values, in %</text>
  <g fill="#0f766e" font-size="13" font-weight="600" text-anchor="middle" font-family="ui-monospace, Menlo, monospace">
    <text x="490" y="316">66.2</text><text x="560" y="316">70.4</text><text x="630" y="316">71.1</text>
    <text x="490" y="340">64.8</text><text x="560" y="340">null</text><text x="630" y="340">69.3</text>
  </g>

  <!-- multiple ranges fan out from the one shared domain (a single coverage) -->
  <path d="M287 214 L 405 156 L 425 156" fill="none" stroke="#334155" stroke-width="2.5"/>
  <polygon points="435,156 425,151 425,161" fill="#334155"/>
  <path d="M287 230 L 405 288 L 425 288" fill="none" stroke="#334155" stroke-width="2.5"/>
  <polygon points="435,288 425,283 425,293" fill="#334155"/>
  <text x="338" y="180" text-anchor="middle" font-size="16" font-weight="700" font-style="italic" fill="#334155">f&#8321;</text>
  <text x="338" y="272" text-anchor="middle" font-size="16" font-weight="700" font-style="italic" fill="#334155">f&#8322;</text>
  <text x="360" y="227" text-anchor="middle" font-size="11.5" fill="#64748b">one range per property</text>
</svg>
