<svg xmlns="http://www.w3.org/2000/svg" viewBox="6 0 504 324" role="img" aria-labelledby="sec-title sec-desc" class="dg">
  <title id="sec-title">Section = Trajectory times VerticalProfile: a ship's depth-profile transect</title>
  <desc id="sec-desc">An equation reads left to right: Trajectory times VerticalProfile equals Section. The Trajectory is a small map of a ship track with four numbered stations, labelled the composite t, x, y axis. The VerticalProfile is a single z depth axis. Their product is the Section, a curtain of values with one column per station and one row per depth. Below, the composite axis is listed as one t, x, y tuple per station, with columns headed hash, t, x and y. A single highlight marks station 1 across all three views at once: its track dot, its row in the composite-axis list, and its column in the curtain, showing one worked correspondence.</desc>

  <rect x="7" y="1" width="502" height="322" rx="16" style="fill:var(--dg-panel);stroke:var(--dg-graticule)" stroke-width="2"/>

  <!-- ===== Factor A: Trajectory ===== -->
  <text x="94" y="26" font-size="12" font-weight="bold" text-anchor="middle" style="fill:var(--dg-domain-ink)">Trajectory</text>
  <text x="94" y="46" font-size="9" text-anchor="middle" style="fill:var(--dg-line)">stations along the ship track</text>
  <rect x="24" y="52" width="140" height="104" rx="5" style="fill:var(--dg-panel);stroke:var(--dg-domain)" stroke-width="1.2"/>
  <polyline points="40,138 74,92 112,112 150,72" style="fill:none;stroke:var(--dg-line)" stroke-width="1.6"/>
  <circle cx="40" cy="138" r="4.5" style="fill:var(--dg-domain)"/><circle cx="74" cy="92" r="4.5" style="fill:var(--dg-domain)"/>
  <circle cx="112" cy="112" r="4.5" style="fill:var(--dg-domain)"/><circle cx="150" cy="72" r="4.5" style="fill:var(--dg-domain)"/>
  <circle cx="40" cy="138" r="7.5" style="fill:none;stroke:var(--dg-instance)" stroke-width="2.5"/>
  <text x="46" y="152" font-size="10" style="fill:var(--dg-ink)">1</text><text x="80" y="88" font-size="10" style="fill:var(--dg-ink)">2</text>
  <text x="118" y="126" font-size="10" style="fill:var(--dg-ink)">3</text><text x="156" y="68" font-size="10" style="fill:var(--dg-ink)">4</text>
  <text x="94" y="172" font-size="9" text-anchor="middle" style="fill:var(--dg-line)">composite (t, x, y) axis</text>

  <text x="190" y="112" font-size="26" text-anchor="middle" style="fill:var(--dg-line)">&#215;</text>

  <!-- ===== Factor B: VerticalProfile ===== -->
  <text x="234" y="26" font-size="12" font-weight="bold" text-anchor="middle" style="fill:var(--dg-domain-ink)">VerticalProfile</text>
  <g style="stroke:var(--dg-domain)" stroke-width="1">
    <rect x="216" y="52" width="38" height="26" style="fill:var(--dg-domain)" fill-opacity="0.15"/><rect x="216" y="78" width="38" height="26" style="fill:var(--dg-domain)" fill-opacity="0.15"/>
    <rect x="216" y="104" width="38" height="26" style="fill:var(--dg-domain)" fill-opacity="0.15"/><rect x="216" y="130" width="38" height="26" style="fill:var(--dg-domain)" fill-opacity="0.15"/>
  </g>
  <g font-size="9" text-anchor="end" style="fill:var(--dg-line)">
    <text x="212" y="69">0</text><text x="212" y="95">10</text><text x="212" y="121">20</text><text x="212" y="147">30</text>
  </g>
  <text x="234" y="172" font-size="9" text-anchor="middle" style="fill:var(--dg-line)">z axis (depth, m)</text>

  <text x="282" y="112" font-size="26" text-anchor="middle" style="fill:var(--dg-line)">=</text>

  <!-- ===== Result: Section curtain (station 1 on the left) ===== -->
  <text x="400" y="26" font-size="12" font-weight="bold" text-anchor="middle" style="fill:var(--dg-range-ink)">Section</text>
  <g font-size="10" text-anchor="middle" style="fill:var(--dg-line)">
    <text x="331" y="46">1</text><text x="377" y="46">2</text><text x="423" y="46">3</text><text x="469" y="46">4</text>
  </g>
  <g style="stroke:var(--dg-line)" stroke-width="1">
    <rect x="308" y="52" width="46" height="26" style="fill:var(--dg-range)" fill-opacity="0.08"/><rect x="354" y="52" width="46" height="26" style="fill:var(--dg-range)" fill-opacity="0.08"/><rect x="400" y="52" width="46" height="26" style="fill:var(--dg-range)" fill-opacity="0.08"/><rect x="446" y="52" width="46" height="26" style="fill:var(--dg-range)" fill-opacity="0.08"/>
    <rect x="308" y="78" width="46" height="26" style="fill:var(--dg-range)" fill-opacity="0.20"/><rect x="354" y="78" width="46" height="26" style="fill:var(--dg-range)" fill-opacity="0.20"/><rect x="400" y="78" width="46" height="26" style="fill:var(--dg-range)" fill-opacity="0.20"/><rect x="446" y="78" width="46" height="26" style="fill:var(--dg-range)" fill-opacity="0.20"/>
    <rect x="308" y="104" width="46" height="26" style="fill:var(--dg-range)" fill-opacity="0.36"/><rect x="354" y="104" width="46" height="26" style="fill:var(--dg-range)" fill-opacity="0.36"/><rect x="400" y="104" width="46" height="26" style="fill:var(--dg-range)" fill-opacity="0.36"/><rect x="446" y="104" width="46" height="26" style="fill:var(--dg-range)" fill-opacity="0.36"/>
    <rect x="308" y="130" width="46" height="26" style="fill:var(--dg-range)" fill-opacity="0.55"/><rect x="354" y="130" width="46" height="26" style="fill:var(--dg-range)" fill-opacity="0.55"/><rect x="400" y="130" width="46" height="26" style="fill:var(--dg-range)" fill-opacity="0.55"/><rect x="446" y="130" width="46" height="26" style="fill:var(--dg-range)" fill-opacity="0.55"/>
  </g>
  <g font-size="11" font-weight="600" text-anchor="middle" style="fill:var(--dg-ink)">
    <text x="331" y="69">18.2</text><text x="377" y="69">17.6</text><text x="423" y="69">16.9</text><text x="469" y="69">15.4</text>
    <text x="331" y="95">14.1</text><text x="377" y="95">13.3</text><text x="423" y="95">12.0</text><text x="469" y="95">11.2</text>
    <text x="331" y="121">9.4</text><text x="377" y="121">8.7</text><text x="423" y="121">8.1</text><text x="469" y="121">7.3</text>
    <text x="331" y="147">6.2</text><text x="377" y="147">5.5</text><text x="423" y="147">5.0</text><text x="469" y="147">4.1</text>
  </g>
  <rect x="308" y="52" width="46" height="104" style="fill:none;stroke:var(--dg-instance)" stroke-width="2.5"/>
  <text x="400" y="172" font-size="9" text-anchor="middle" style="fill:var(--dg-line)">value at each (station, depth) &#183; &#176;C</text>

  <!-- ===== Composite axis list (heading matched to the panel headings) ===== -->
  <text x="256" y="206" font-size="12" font-weight="bold" text-anchor="middle" style="fill:var(--dg-domain-ink)">Composite axis</text>
  <text x="256" y="221" font-size="9" text-anchor="middle" style="fill:var(--dg-line)">one (t, x, y) tuple per station</text>
  <g font-size="9" font-style="italic" text-anchor="middle" style="fill:var(--dg-line)">
    <text x="143" y="237">#</text><text x="228" y="237">t</text><text x="322" y="237">x</text><text x="366" y="237">y</text>
  </g>
  <rect x="132" y="243" width="256" height="15" style="fill:none;stroke:var(--dg-instance)" stroke-width="2"/>
  <g font-size="10.5" style="fill:var(--dg-ink)">
    <text x="140" y="254">1&#160;&#160;&#160;2024-03-01T12:00:00Z&#160;&#160;&#160;12.5&#160;&#160;&#160;45.3</text>
    <text x="140" y="270">2&#160;&#160;&#160;2024-03-01T13:00:00Z&#160;&#160;&#160;12.8&#160;&#160;&#160;45.6</text>
    <text x="140" y="286">3&#160;&#160;&#160;2024-03-01T14:00:00Z&#160;&#160;&#160;13.1&#160;&#160;&#160;45.9</text>
    <text x="140" y="302">4&#160;&#160;&#160;2024-03-01T15:00:00Z&#160;&#160;&#160;13.4&#160;&#160;&#160;46.2</text>
  </g>
</svg>
