<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 536 236" role="img" aria-labelledby="prb-title prb-desc" class="dg">
  <title id="prb-title">A shared key binds a parameter to its range</title>
  <desc id="prb-desc">Two cards side by side: a parameters card on the left, describing each parameter, and a ranges card on the right, holding the values. Both contain a key named temperature, highlighted and joined by a connector labelled shared key. The left temperature entry is a Parameter object with unit Cel; the right is an NdArray object whose values are an array of numbers. A faint humidity entry in each card, joined by a dashed connector labelled another shared key, shows that a second parameter adds a second matching key.</desc>

  <rect x="1" y="1" width="534" height="234" rx="16" style="fill:var(--dg-panel);stroke:var(--dg-graticule)" stroke-width="2"/>

  <!-- parameters card (a description of each parameter) -->
  <rect x="18" y="18" width="216" height="200" rx="12" style="fill:var(--dg-panel);stroke:var(--dg-line)" stroke-width="2"/>
  <text x="32" y="44" font-size="14" font-weight="700" style="fill:var(--dg-ink)">"parameters"</text>
  <text x="32" y="62" font-size="10.5" style="fill:var(--dg-line)">a description of each parameter</text>

  <!-- ranges card (one data array per parameter) -->
  <rect x="302" y="18" width="216" height="200" rx="12" style="fill:var(--dg-panel);stroke:var(--dg-range)" stroke-width="2"/>
  <text x="316" y="44" font-size="14" font-weight="700" style="fill:var(--dg-range-ink)">"ranges"</text>
  <text x="316" y="62" font-size="10.5" style="fill:var(--dg-range-ink)">one data array per parameter</text>

  <!-- shared key highlight: temperature (amber) -->
  <rect x="28" y="78" width="196" height="96" rx="8" style="fill:var(--dg-instance);stroke:var(--dg-instance)" fill-opacity="0.18" stroke-width="1.5"/>
  <g>
    <text x="38" y="99" font-size="12.5" font-weight="700" style="fill:var(--dg-instance-ink)">"temperature": {</text>
    <text x="54" y="120" font-size="11" style="fill:var(--dg-line)">"type": "Parameter",</text>
    <text x="54" y="140" font-size="11" style="fill:var(--dg-line)">"unit": "Cel"</text>
    <text x="38" y="160" font-size="12.5" font-weight="700" style="fill:var(--dg-instance-ink)">}</text>
  </g>

  <rect x="312" y="78" width="196" height="96" rx="8" style="fill:var(--dg-instance);stroke:var(--dg-instance)" fill-opacity="0.18" stroke-width="1.5"/>
  <g>
    <text x="322" y="99" font-size="12.5" font-weight="700" style="fill:var(--dg-instance-ink)">"temperature": {</text>
    <text x="338" y="120" font-size="11" style="fill:var(--dg-line)">"type": "NdArray",</text>
    <text x="338" y="140" font-size="11" style="fill:var(--dg-line)">"values": [18.4, 18.9, &#8230;]</text>
    <text x="322" y="160" font-size="12.5" font-weight="700" style="fill:var(--dg-instance-ink)">}</text>
  </g>

  <!-- connector for the shared key (label centred in the gap, clear of both borders) -->
  <line x1="224" y1="93" x2="312" y2="93" style="stroke:var(--dg-instance)" stroke-width="2.5"/>
  <text x="268" y="84" text-anchor="middle" font-size="10" font-weight="600" style="fill:var(--dg-instance-ink)">shared key</text>

  <!-- faint second pair: humidity (another shared key, same pattern) -->
  <text x="38" y="206" font-size="12" style="fill:var(--dg-line)" opacity="0.6">"humidity": { ... }</text>
  <text x="322" y="206" font-size="12" style="fill:var(--dg-line)" opacity="0.6">"humidity": { ... }</text>
  <line x1="224" y1="202" x2="312" y2="202" style="stroke:var(--dg-line)" stroke-width="1.5" stroke-dasharray="3 3" opacity="0.45"/>
  <text x="268" y="188" text-anchor="middle" font-size="8.5" font-weight="600" style="fill:var(--dg-line)" opacity="0.6">another</text>
  <text x="268" y="198" text-anchor="middle" font-size="8.5" font-weight="600" style="fill:var(--dg-line)" opacity="0.6">shared key</text>
</svg>
